<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English-Luganda Translator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-section, .output-section {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .input-section:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .input-section h2, .output-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            resize: none;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .char-count {
            font-size: 0.9em;
            color: #999;
            margin-top: 8px;
        }

        .output-text {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            font-size: 1em;
            word-wrap: break-word;
            white-space: pre-wrap;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .btn-translate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-translate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-translate:active {
            transform: translateY(0);
        }

        .btn-copy {
            background-color: #4caf50;
            color: white;
        }

        .btn-copy:hover {
            background-color: #45a049;
        }

        .btn-clear {
            background-color: #ff9800;
            color: white;
        }

        .btn-clear:hover {
            background-color: #e68900;
        }

        .examples-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .examples-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .example-card {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .example-card:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .example-label {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .example-text {
            font-size: 1.1em;
            font-weight: 500;
        }

        .status-bar {
            margin-top: 30px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            text-align: center;
            color: #666;
            font-size: 0.95em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #4caf50;
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 768px) {
            .translator-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇬🇧🇺🇬 English-Luganda Translator</h1>
            <p>Preserve your cultural heritage through language</p>
        </div>

        <div id="messageContainer"></div>

        <div class="translator-grid">
            <div class="input-section">
                <h2>English</h2>
                <textarea id="inputText" placeholder="Type English text here..."></textarea>
                <div class="char-count">
                    Characters: <span id="charCount">0</span>
                </div>
                <div class="button-group">
                    <button class="btn-translate" onclick="translateText()">Translate →</button>
                    <button class="btn-clear" onclick="clearInput()">Clear</button>
                </div>
            </div>

            <div class="output-section">
                <h2>Luganda</h2>
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Translating...</p>
                </div>
                <div id="outputText" class="output-text">Translation will appear here...</div>
                <div class="button-group">
                    <button class="btn-copy" onclick="copyToClipboard()">📋 Copy</button>
                    <button class="btn-clear" onclick="clearOutput()">Clear</button>
                </div>
            </div>
        </div>

        <div class="examples-section">
            <h3>📚 Try These Examples</h3>
            <div class="examples-grid" id="examplesContainer"></div>
        </div>

        <div class="status-bar">
            System Status: <span class="status-badge">🟢 Online</span>
            <br><small id="statusInfo"></small>
        </div>
    </div>

    <script>
        // Update character count
        document.getElementById('inputText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        // Load examples on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadExamples();
            updateStatus();
        });

        async function loadExamples() {
            try {
                const response = await fetch('/api/examples');
                const data = await response.json();
                
                const container = document.getElementById('examplesContainer');
                container.innerHTML = '';
                
                data.examples.forEach(example => {
                    const card = document.createElement('div');
                    card.className = 'example-card';
                    card.innerHTML = `
                        <div class="example-label">English</div>
                        <div class="example-text">${example.english}</div>
                    `;
                    card.onclick = () => {
                        document.getElementById('inputText').value = example.english;
                        document.getElementById('charCount').textContent = example.english.length;
                        translateText();
                    };
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading examples:', error);
            }
        }

        async function translateText() {
            const inputText = document.getElementById('inputText').value.trim();
            
            if (!inputText) {
                showMessage('Please enter text to translate', 'error');
                return;
            }

            // Show loading state
            document.getElementById('loading').style.display = 'block';
            document.getElementById('outputText').style.display = 'none';

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: inputText })
                });

                const data = await response.json();

                // Hide loading state
                document.getElementById('loading').style.display = 'none';
                document.getElementById('outputText').style.display = 'flex';

                if (data.status === 'success') {
                    document.getElementById('outputText').textContent = data.translation;
                    showMessage(`✅ Translated (Source: ${data.source})`, 'success');
                } else {
                    showMessage(`Error: ${data.message}`, 'error');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('outputText').style.display = 'flex';
                showMessage('Translation error: ' + error.message, 'error');
                console.error('Error:', error);
            }
        }

        function copyToClipboard() {
            const outputText = document.getElementById('outputText').textContent;
            if (outputText === 'Translation will appear here...') {
                showMessage('Nothing to copy', 'info');
                return;
            }
            
            navigator.clipboard.writeText(outputText).then(() => {
                showMessage('✅ Copied to clipboard!', 'success');
            }).catch(err => {
                showMessage('Failed to copy', 'error');
                console.error('Error:', err);
            });
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
            document.getElementById('charCount').textContent = '0';
        }

        function clearOutput() {
            document.getElementById('outputText').textContent = 'Translation will appear here...';
        }

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                document.getElementById('statusInfo').textContent = 
                    `Dictionary: ${data.dictionary_phrases} phrases loaded | Model: ${data.model}`;
            } catch (error) {
                console.error('Error updating status:', error);
            }
        }

        // Allow Enter key to translate
        document.getElementById('inputText').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                translateText();
            }
        });
    </script>
</body>
</html>
